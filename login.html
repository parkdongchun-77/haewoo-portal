<!doctype html>
<!-- 소셜 로그인 페이지 (Google·Facebook·Kakao·Zalo · Supabase Auth) -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 — Haewoo Vina</title>
<style>
:root{--navy:#14233f;--navy2:#1f3358;--gold:#c2a36b;--line:#e4e8ee;--muted:#6d7384}
*{box-sizing:border-box}body{margin:0;font-family:'Noto Sans KR',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%,var(--navy2),var(--navy) 72%)}
.card{background:#fff;border-radius:20px;padding:34px;width:360px;max-width:92vw;box-shadow:0 30px 70px rgba(0,0,0,.35)}
.brand{font-family:'Noto Serif KR',serif;font-weight:700;font-size:22px;color:var(--navy);text-align:center}.brand b{color:var(--gold)}
.sub{text-align:center;color:var(--muted);font-size:13px;margin:4px 0 22px}
.btns{display:flex;flex-direction:column;gap:11px}
.sbtn{display:flex;align-items:center;gap:12px;width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:13px 16px;font-size:15px;font-weight:600;cursor:pointer;color:#1b2435;transition:.15s}
.sbtn:hover{box-shadow:0 8px 22px rgba(20,35,63,.12);transform:translateY(-1px)}
.sbtn .ic{width:22px;height:22px;flex:0 0 22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.sbtn.google .ic{background:#fff;border:1px solid #e4e8ee}.sbtn.google .ic svg{width:18px;height:18px}
.sbtn.kakao{background:#FEE500;border-color:#FEE500}.sbtn.kakao .ic{background:#000;color:#FEE500;border-radius:50%}
.sbtn.facebook{background:#1877F2;border-color:#1877F2;color:#fff}.sbtn.facebook .ic{background:#fff;color:#1877F2;border-radius:50%}
.sbtn.zalo{background:#0068FF;border-color:#0068FF;color:#fff}.sbtn.zalo .ic{background:#fff;color:#0068FF}
.foot{text-align:center;margin-top:20px;font-size:12px}.foot a{color:var(--muted)}
.me{display:none;text-align:center}.me .av{width:64px;height:64px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;font-family:'Noto Serif KR',serif}
.me .nm{font-weight:700;color:var(--navy)}.me .em{color:var(--muted);font-size:13px;margin-bottom:16px}
.me .go{display:block;background:var(--navy);color:#fff;border-radius:12px;padding:13px;font-weight:700;text-decoration:none;margin-bottom:9px}
.me .lo{display:block;background:#f0f2f6;color:#33415a;border:0;border-radius:12px;padding:11px;width:100%;cursor:pointer}
.msg{display:none;background:#fdf3e7;border:1px solid #f0dcc0;color:#8a6d3b;font-size:12px;border-radius:10px;padding:10px;margin-bottom:14px;line-height:1.6}
.idform{display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.idform input{padding:13px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px}
.idform input:focus{outline:none;border-color:var(--gold)}
.idform button{padding:13px;border:0;border-radius:12px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:14px 0}
.divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--line)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">HAEWOO <b>VINA</b></div>
  <div class="sub" id="sub">소셜 계정으로 로그인 · Đăng nhập</div>

  <div class="msg" id="msg"></div>

  <form class="idform" id="idlogin" onsubmit="return adminLogin(event)">
    <input id="aid" placeholder="아이디" autocomplete="username">
    <input id="apw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button type="submit">로그인</button>
  </form>
  <div class="divider" id="dvd"><span>또는 소셜 계정으로</span></div>

  <div class="btns" id="btns">
    <button class="sbtn zalo" data-p="zalo"><span class="ic">Z</span>Zalo 로그인</button>
    <button class="sbtn google" data-p="google"><span class="ic"><svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.5 2.6 30.1 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.8 6.1C12.3 13.3 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7C43.7 38 46.5 31.8 46.5 24.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.8-6.1C1 16.6 0 20.2 0 24s1 7.4 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.4-5.7c-2 1.4-4.7 2.3-7.6 2.3-6.4 0-11.7-3.8-13.6-9.4l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg></span>Google로 로그인</button>
    <button class="sbtn kakao" data-p="kakao"><span class="ic">K</span>카카오 로그인</button>
    <button class="sbtn facebook" data-p="facebook"><span class="ic">f</span>Facebook 로그인</button>
  </div>

  <div class="me" id="me">
    <div class="av" id="av">H</div>
    <div class="nm" id="nm"></div>
    <div class="em" id="em"></div>
    <a class="go" id="go" href="portal.html">임직원 시스템으로 이동 →</a>
    <button class="lo" id="lo">로그아웃</button>
  </div>

  <div class="foot"><a href="index.html">← 회사 홈페이지</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="haewoo-sb.js"></script>
<script>
// 소셜 로그인 로직 (Supabase OAuth + Zalo 커스텀)
const params=new URLSearchParams(location.search);
const NEXT=params.get('next')||'portal.html';
const sb=supabase.createClient(SB_URL,SB_KEY);
const $=id=>document.getElementById(id);

async function refresh(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    const u=session.user, meta=u.user_metadata||{};
    const name=meta.full_name||meta.name||meta.user_name||u.email||'사용자';
    $('btns').style.display='none'; $('sub').textContent='로그인됨 · Đã đăng nhập';
    $('idlogin').style.display='none'; $('dvd').style.display='none';
    $('me').style.display='block';
    $('nm').textContent=name; $('em').textContent=u.email||(u.app_metadata&&u.app_metadata.provider)||'';
    $('av').textContent=(name[0]||'H').toUpperCase();
    $('go').href='checkin.html'; $('go').textContent='근태(출퇴근)으로 이동 →';
    // 소셜 로그인 시 위치 공유 권한을 미리 요청
    if(navigator.geolocation) navigator.geolocation.getCurrentPosition(()=>{},()=>{},{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  } else {
    $('btns').style.display='flex'; $('me').style.display='none';
    $('idlogin').style.display='flex'; $('dvd').style.display='flex';
    $('sub').textContent='로그인 · Đăng nhập';
  }
}
function note(t){ $('msg').style.display='block'; $('msg').textContent=t; }

// 아이디·비밀번호 기본 로그인 (Master·관리자, haewoo_admin)
async function adminLogin(e){
  e.preventDefault();
  const u=$('aid').value.trim(), p=$('apw').value;
  if(!u||!p){ note('아이디와 비밀번호를 입력하세요.'); return false; }
  try{
    const r=await rpc('haewoo_admin_login',{p_username:u,p_passcode:p});
    if(!r.ok){ note(r.message||'아이디 또는 비밀번호가 올바르지 않습니다.'); return false; }
    sessionStorage.setItem('hw_admin', JSON.stringify({u,p,name:r.name,level:r.level,emp_no:r.emp_no}));
    location.href='attendance.html';
  }catch(err){ note('연결 오류: '+err.message); }
  return false;
}

document.querySelectorAll('.sbtn').forEach(b=>b.onclick=async()=>{
  const p=b.dataset.p;
  const redirectTo=location.origin+location.pathname+'?next='+encodeURIComponent(NEXT);
  if(p==='zalo'){
    // Zalo는 Supabase 기본 제공자가 아니라 Edge Function으로 처리
    location.href=`${SB_URL}/functions/v1/zalo-oauth/login?redirect=${encodeURIComponent(redirectTo)}`;
    return;
  }
  const { error } = await sb.auth.signInWithOAuth({ provider:p, options:{ redirectTo } });
  if(error) note(p+' 로그인 오류: '+error.message+'  (Supabase 대시보드에서 '+p+' 제공자 설정이 필요합니다)');
});
$('lo').onclick=async()=>{ await sb.auth.signOut(); refresh(); };
sb.auth.onAuthStateChange(()=>refresh());
refresh();
</script>
</body>
</html>
