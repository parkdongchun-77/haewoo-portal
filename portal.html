<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>임직원 시스템 — Haewoo Vina</title>
<style>
:root{--navy:#14233f;--navy2:#1f3358;--gold:#c2a36b;--bg:#f6f4ef;--ink:#1b2435;--muted:#6d7384;--line:#e7e2d8}
*{box-sizing:border-box}body{margin:0;font-family:'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
.hero{background:radial-gradient(circle at 30% 20%,var(--navy2),var(--navy) 70%);color:#fff;padding:40px 24px 52px;text-align:center}
.hero .mark{color:var(--gold);font-size:30px}.hero h1{margin:8px 0 4px;font-size:24px}
.hero p{color:rgba(255,255,255,.75);margin:0}.hero a{color:var(--gold);font-size:13px;text-decoration:none}
.wrap{max-width:980px;margin:-30px auto 0;padding:0 20px 40px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.cat{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:0 10px 30px rgba(20,35,63,.08);transition:transform .15s,border-color .15s}
.cat:hover{transform:translateY(-4px);border-color:var(--gold)}
.cat .ic{font-size:26px}.cat h3{margin:10px 0 4px;font-family:'Noto Serif KR',serif;color:var(--navy)}
.cat p{margin:0;color:var(--muted);font-size:13px}
.badge{display:inline-block;margin-top:10px;font-size:11px;color:#fff;background:var(--gold);padding:2px 8px;border-radius:10px}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hero">
  <div class="mark">❖</div>
  <h1>임직원 시스템 포털</h1>
  <p>물류 · 통관 · 수책 · 근태를 한 곳에서</p>
  <div style="margin-top:10px"><a href="index.html">← 회사 홈페이지로</a></div>
</div>
<div class="wrap">
  <div class="grid">
    <a class="cat" href="attendance.html">
      <div class="ic">🕒</div><h3>근태 관리</h3>
      <p>3교대 창고 근태 · QR 출퇴근(GPS 25m) · 조 편성 · 이력 (Supabase)</p><span class="badge">바로가기</span></a>
    <a class="cat" href="http://localhost:8001/" target="_blank">
      <div class="ic">📊</div><h3>수책 (Liquidation)</h3>
      <p>세관/기업 재고 밸런스 · GAP · 추징세금</p><span class="badge">실행 중 :8001</span></a>
    <a class="cat" href="http://localhost:8000/" target="_blank">
      <div class="ic">📦</div><h3>EDI System</h3>
      <p>인보이스 · 패킹리스트 · EDI 생성/전송</p><span class="badge">실행 중 :8000</span></a>
    <a class="cat" href="index.html">
      <div class="ic">🏠</div><h3>회사 홈페이지</h3>
      <p>회사 소개 · 물류 솔루션 · 견적 요청</p><span class="badge">바로가기</span></a>
  </div>
</div>
</body>
</html>
