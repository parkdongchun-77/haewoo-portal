<!doctype html>
<!-- 관리자·중간관리자용 근태 대시보드 (3교대 현황·이력·QR발급·기준위치) -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>근태 관리 — Haewoo Vina</title>
<style>
:root{--navy:#14233f;--navy2:#1f3358;--gold:#c2a36b;--bg:#f5f7fa;--ink:#1b2435;--muted:#6d7384;--line:#e4e8ee;--in:#1f8a54;--out:#c0492f}
*{box-sizing:border-box}body{margin:0;font-family:'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
a{color:inherit}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%,var(--navy2),var(--navy) 70%)}
.lbox{background:#fff;border-radius:18px;padding:32px;width:320px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.lbox h1{font-family:'Noto Serif KR',serif;font-size:20px;margin:0 0 4px;color:var(--navy)}.lbox p{margin:0 0 18px;color:var(--muted);font-size:13px}
.lbox input{width:100%;padding:13px;border:1px solid var(--line);border-radius:11px;font-size:15px;margin-bottom:12px}
.lbox button{width:100%;padding:13px;border:0;border-radius:11px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
.lerr{color:var(--out);font-size:13px;margin-bottom:10px;display:none}
.hdr{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px}
.hdr .t{font-family:'Noto Serif KR',serif;font-weight:700}.hdr .t b{color:var(--gold)}
.hdr .sp{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:13px}
.hdr a.home{color:rgba(255,255,255,.8);text-decoration:none}.hdr button.lo{background:rgba(255,255,255,.14);border:0;color:#fff;padding:7px 12px;border-radius:9px;cursor:pointer}
.hdr .langs{color:rgba(255,255,255,.55);font-size:13px;margin-right:4px}.hdr .langb{cursor:pointer;font-weight:400}.hdr .langb.on{color:#fff;font-weight:700}
.tabs{display:flex;gap:4px;background:#fff;border-bottom:1px solid var(--line);padding:0 12px;overflow-x:auto}
.tab{padding:14px 16px;font-size:14px;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.tab.on{color:var(--navy);font-weight:700;border-bottom-color:var(--gold)}
.wrap{max-width:1080px;margin:0 auto;padding:20px}
.bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.bar input[type=date]{padding:8px 10px;border:1px solid var(--line);border-radius:9px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.kpi .n{font-size:26px;font-weight:800;color:var(--navy)}.kpi .l{font-size:12px;color:var(--muted)}
.grp{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
.grp h3{margin:0;padding:12px 16px;background:#f0f3f8;font-size:14px;color:var(--navy);display:flex;justify-content:space-between}
.grp h3 .cnt{color:var(--muted);font-weight:400}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 12px;text-align:left;border-top:1px solid var(--line)}
th{background:#fafbfd;color:var(--muted);font-weight:600;font-size:12px}
.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.pill.in{background:#e7f6ee;color:var(--in)}.pill.out{background:#fdece7;color:var(--out)}.pill.no{background:#eef0f4;color:#98a0b0}
.pill.sM{background:#fff4d6;color:#9a6b00}.pill.sA{background:#e2eefb;color:#2563a6}.pill.sN{background:#e7e0f7;color:#5b3ea8}
tfoot th{background:#f0f3f8;color:var(--navy);font-size:13px;padding:10px 12px}
.bar input[type=month]{padding:8px 10px;border:1px solid var(--line);border-radius:9px}
.bar input[type=number]{padding:8px 10px;border:1px solid var(--line);border-radius:9px}
.role{color:var(--muted);font-size:12px}
.shift{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.scard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.scard .c{font-size:13px;color:var(--gold);font-weight:700}.scard .h{font-size:20px;font-weight:800;color:var(--navy);margin:4px 0}
.qrgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.qc{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.qc .qimg{display:flex;justify-content:center;margin:6px 0}
.qc .nm{font-weight:700;color:var(--navy);font-size:14px}.qc .mt{font-size:12px;color:var(--muted);margin-bottom:6px}
.qc button{font-size:12px;border:1px solid var(--line);background:#f7f9fc;border-radius:8px;padding:6px 10px;cursor:pointer;margin-top:6px}
.note{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;font-size:14px;line-height:1.9}
.note input{padding:9px;border:1px solid var(--line);border-radius:9px;width:130px}
.note button{padding:9px 14px;border:0;border-radius:9px;background:var(--navy);color:#fff;font-weight:700;cursor:pointer}
.note select{padding:9px;border:1px solid var(--line);border-radius:9px}
.ebtn{font-size:12px;border:1px solid var(--line);background:#f7f9fc;border-radius:8px;padding:5px 10px;cursor:pointer}
.mcard{display:block;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;text-decoration:none;color:var(--navy);font-weight:700;box-shadow:0 8px 20px rgba(20,35,63,.06)}.mcard:hover{border-color:var(--gold)}
@media(max-width:720px){.cards3{grid-template-columns:1fr 1fr !important}}
.muted{color:var(--muted)}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr)}.shift{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="lbox">
    <h1>근태 관리 시스템</h1>
    <p>Hệ thống chấm công · 관리자 로그인</p>
    <div class="lerr" id="lerr"></div>
    <input id="u" placeholder="아이디" autocomplete="username">
    <input id="p" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button id="loginBtn">로그인</button>
    <p style="margin-top:14px"><a href="index.html" style="color:var(--muted);font-size:12px">← 회사 홈페이지</a></p>
  </div>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="t" style="cursor:pointer" title="뒤로 / 임직원 포털" onclick="if(history.length>1)history.back();else location.href='portal.html'">← HAEWOO <b>VINA</b> · 근태</div>
    <div class="sp"><span class="langs"><b class="langb on" data-l="ko">KO</b> · <b class="langb" data-l="vi">VI</b></span><span class="muted" id="whoami"></span><a class="home" href="portal.html">시스템</a><button class="lo" id="logout">로그아웃</button></div>
  </div>
  <div class="tabs">
    <div class="tab on" data-v="today">근태 현황</div>
    <div class="tab" data-v="log">출퇴근 이력</div>
    <div class="tab" data-v="shift">3교대 / 조 편성</div>
    <div class="tab" data-v="rota">회전표</div>
    <div class="tab" data-v="pay">급여</div>
    <div class="tab" data-v="qr">QR 발급</div>
    <div class="tab" data-v="loc">기준 위치</div>
    <div class="tab" data-v="emp">직원 관리</div>
    <div class="tab" data-v="xlcmp">엑셀 대조</div>
    <div class="tab" data-v="bot">해우봇 문의</div>
    <div class="tab" data-v="quote">견적 문의</div>
    <div class="tab" id="masterTab" data-v="master" style="display:none;color:#a8884d;font-weight:700">★ Master 전용</div>
  </div>
  <div class="wrap" id="view"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="haewoo-sb.js"></script>
<script>
// 관리자 대시보드 로직 (RPC 조회 + QR 발급 + 위치 설정)
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let CRED=null; try{CRED=JSON.parse(sessionStorage.getItem('hw_admin')||'null')}catch(e){}
const TEAM_ORDER=['지원','G1','G2','G3'], ROLE_ORDER=['Leader','System','Forklift','InOut','Manager','HR'];
let SITE='박닌';  // 사업장 선택(하노이/박닌)
function siteToggle(){ return '<span style="display:inline-flex;gap:8px;margin-left:10px">'+['하노이','박닌'].map(s=>`<button class="sitebtn" data-site="${s}" style="padding:9px 22px;border-radius:11px;font-size:16px;font-weight:700;border:1px solid #d6dbe4;cursor:pointer;${SITE===s?'background:#14233f;color:#fff;border-color:#14233f;box-shadow:0 3px 10px rgba(20,35,63,.18)':'background:#fff;color:#33415a'}">${s}</button>`).join('')+'</span>'; }
function bindSite(reload){ $$('.sitebtn').forEach(b=>b.onclick=()=>{ SITE=b.dataset.site; reload(); }); }
const ROLE_KO={Leader:'조장',System:'시스템',Forklift:'지게차',InOut:'입출고',Manager:'매니저',HR:'HR'};
const today=()=> new Date().toISOString().slice(0,10);
const hm=ts=> ts? new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '';

async function login(){
  const u=$('#u').value.trim(), p=$('#p').value;
  try{
    const r=await rpc('haewoo_admin_login',{p_username:u,p_passcode:p});
    if(!r.ok){ $('#lerr').textContent=r.message; $('#lerr').style.display='block'; return; }
    CRED={u,p,name:r.name,level:r.level,emp_no:r.emp_no}; sessionStorage.setItem('hw_admin',JSON.stringify(CRED));
    boot();
  }catch(e){ $('#lerr').textContent='연결 오류: '+e.message; $('#lerr').style.display='block'; }
}
function logout(){ sessionStorage.removeItem('hw_admin'); location.reload(); }
function args(extra){ return Object.assign({p_username:CRED.u,p_passcode:CRED.p}, extra||{}); }

function boot(){
  $('#login').style.display='none'; $('#app').style.display='block';
  const lv={master:'Master',admin:'관리자'}[CRED.level]||'중간관리자';
  $('#whoami').textContent=`${CRED.name||CRED.u} (${lv})`;
  $('#masterTab').style.display = CRED.level==='master' ? '' : 'none';   // Master 전용 폴더는 Master만
  $$('.tab').forEach(t=>t.onclick=()=>{ $$('.tab').forEach(x=>x.classList.toggle('on',x===t)); show(t.dataset.v); });
  show('today');
}
function show(v){ if(v==='master'&&CRED.level!=='master'){ v='today'; } ({today:vToday,log:vLog,shift:vShift,rota:vRota,pay:vPay,qr:vQR,loc:vLoc,emp:vEmp,xlcmp:vXlcmp,bot:vBot,quote:vQuote,master:vMaster}[v])(); }

// 3교대 회전 로직 (2026-06-22 월요일 시작, 주간회전, 일요일 휴무)
const SHIFT_BASE=Date.UTC(2026,5,22);
function weekIdx(dt){ return Math.floor((Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate())-SHIFT_BASE)/(7*86400000)); }
function groupShift(team,dt){ if(dt.getDay()===0) return null; const w=((weekIdx(dt)%3)+3)%3; const order=['M','A','N']; const gi={G1:0,G2:1,G3:2}[team]; if(gi==null) return null; return order[(gi+w)%3]; }
function shiftPill(s){ const x={M:['주간','sM'],A:['오후','sA'],N:['야간','sN']}[s]; return `<span class="pill ${x[1]}">${x[0]}</span>`; }
const curMonth=()=> new Date().toISOString().slice(0,7);

async function vToday(){
  $('#view').innerHTML=`<div class="bar"><b>근태 현황</b><input type="date" id="d" value="${today()}">${siteToggle()}</div><div id="body" class="muted">불러오는 중…</div>`;
  $('#d').onchange=()=>loadToday($('#d').value);
  bindSite(()=>loadToday($('#d').value));
  loadToday(today());
}
async function loadToday(d){
  const r=await rpc('haewoo_roster',args({p_date:d}));
  if(!r.ok){ $('#body').innerHTML='<span class="muted">'+r.message+'</span>'; return; }
  const rows=(r.rows||[]).filter(x=>x.site===SITE); const inN=rows.filter(x=>x.in_ts).length, outN=rows.filter(x=>x.out_ts).length, working=rows.filter(x=>x.in_ts&&!x.out_ts).length;
  let h=`<div class="kpis">
    <div class="kpi"><div class="n">${rows.length}</div><div class="l">총원</div></div>
    <div class="kpi"><div class="n">${inN}</div><div class="l">출근</div></div>
    <div class="kpi"><div class="n">${working}</div><div class="l">근무중</div></div>
    <div class="kpi"><div class="n">${outN}</div><div class="l">퇴근</div></div></div>`;
  for(const tm of TEAM_ORDER){
    const g=rows.filter(x=>x.team===tm); if(!g.length) continue;
    g.sort((a,b)=>ROLE_ORDER.indexOf(a.role)-ROLE_ORDER.indexOf(b.role)||a.emp_no-b.emp_no);
    h+=`<div class="grp"><h3><span>${tm==='지원'?'지원 (Support)':tm}</span><span class="cnt">${g.length}명</span></h3>
      <table><thead><tr><th>#</th><th>이름</th><th>업무</th><th>출근</th><th>퇴근</th><th>상태</th></tr></thead><tbody>`;
    for(const e of g){
      const st = e.in_ts&&e.out_ts? '<span class="pill out">퇴근</span>' : e.in_ts? '<span class="pill in">근무중</span>' : '<span class="pill no">미출근</span>';
      const me = CRED.emp_no && e.emp_no===CRED.emp_no;
      let cin, cout;
      if(me){
        // 본인 행: 출근은 1회(찍으면 시간 표시·잠금), 퇴근은 출근 후에만(여러번 가능, 마지막 시간 표시)
        cin = e.in_ts ? `${hm(e.in_ts)} <span class="muted">🔒</span>`
                      : `<button class="ebtn" data-pk="in" style="background:#1f8a54;color:#fff;border-color:#1f8a54">출근</button>`;
        cout = e.in_ts ? `<button class="ebtn" data-pk="out" style="background:#c0492f;color:#fff;border-color:#c0492f">퇴근</button>${e.out_ts?' '+hm(e.out_ts):''}`
                       : `<span class="muted">출근 후</span>`;
      } else { cin=hm(e.in_ts); cout=hm(e.out_ts); }
      h+=`<tr${me?' style="background:#fff7e6"':''}><td>${e.emp_no}</td><td>${e.full_name}${me?' <span class="pill in">나</span>':''}</td><td class="role">${ROLE_KO[e.role]||e.role}</td><td>${cin}</td><td>${cout}</td><td>${st}</td></tr>`;
    }
    h+='</tbody></table></div>';
  }
  $('#body').innerHTML=h;
  // 본인 행 출퇴근 버튼: 위치 측정 → 규칙 검증(서버) → 새로고침
  $$('.ebtn[data-pk]').forEach(b=>b.onclick=async()=>{
    b.disabled=true; const k=b.dataset.pk;
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:15000,maximumAge:0}));
      const r=await rpc('haewoo_self_punch',args({p_kind:k,p_lat:pos.coords.latitude,p_lng:pos.coords.longitude}));
      if(!r.ok){ alert(r.message||'처리 실패'); b.disabled=false; return; }
      loadToday(d);
    }catch(e){ alert(e&&e.code? '위치를 가져올 수 없습니다. GPS/위치 권한을 확인하세요.' : ('오류: '+(e.message||e))); b.disabled=false; }
  });
}

async function vLog(){
  $('#view').innerHTML=`<div class="bar"><b>출퇴근 이력</b><input type="date" id="d" value="${today()}"></div><div id="body" class="muted">불러오는 중…</div>`;
  $('#d').onchange=()=>loadLog($('#d').value); loadLog(today());
}
async function loadLog(d){
  const r=await rpc('haewoo_attendance_log',args({p_date:d}));
  if(!r.ok){ $('#body').innerHTML='<span class="muted">'+r.message+'</span>'; return; }
  const rows=r.rows||[];
  if(!rows.length){ $('#body').innerHTML='<div class="grp"><h3><span>'+d+'</span></h3><table><tbody><tr><td class="muted" style="padding:18px">기록 없음</td></tr></tbody></table></div>'; return; }
  let h=`<div class="grp"><h3><span>${d} · ${rows.length}건</span></h3><table><thead><tr><th>시간</th><th>#</th><th>이름</th><th>조</th><th>구분</th><th>거리</th></tr></thead><tbody>`;
  for(const e of rows){
    h+=`<tr><td>${new Date(e.ts).toLocaleString('ko-KR')}</td><td>${e.emp_no}</td><td>${e.full_name}</td><td>${e.team}</td>
      <td>${e.kind==='in'?'<span class="pill in">출근</span>':'<span class="pill out">퇴근</span>'}</td><td>${e.distance_m??''}m</td></tr>`;
  }
  $('#body').innerHTML=h+'</tbody></table></div>';
}

async function vShift(){
  let sh=[]; try{ const r=await fetch(`${SB_URL}/rest/v1/haewoo_shift?select=*&order=sort`,{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}}); sh=await r.json(); }catch(e){}
  let h='<div class="bar"><b>3교대 운영 (3 Shift)</b><span class="muted">2026-06-22 정상 운영 기준</span></div><div class="shift">';
  for(const s of sh){ const inside=(s.name.match(/\(([^)]+)\)/)||[])[1]||''; const base=s.name.split('(')[0].trim();
    h+=`<div class="scard"><div class="c">${s.code}조</div><div class="h">${inside}</div><div class="muted">${base}</div></div>`; }
  h+='</div>';
  const r=await rpc('haewoo_roster',args({p_date:today()}));
  const rows=(r&&r.rows)||[];
  for(const tm of TEAM_ORDER){
    const g=rows.filter(x=>x.team===tm); if(!g.length) continue;
    const by=k=>g.filter(x=>x.role===k).map(x=>x.full_name).join(', ')||'-';
    h+=`<div class="grp"><h3><span>${tm==='지원'?'지원 (Support)':tm+' 조'}</span><span class="cnt">${g.length}명</span></h3>
      <table><tbody>
      ${tm==='지원'?`<tr><th style="width:90px">매니저</th><td>${by('Manager')}</td></tr><tr><th>HR</th><td>${by('HR')}</td></tr>`:
      `<tr><th style="width:90px">조장</th><td>${by('Leader')}</td></tr>
      <tr><th>시스템</th><td>${by('System')}</td></tr>
      <tr><th>지게차</th><td>${by('Forklift')}</td></tr>
      <tr><th>입출고</th><td>${by('InOut')}</td></tr>`}
      </tbody></table></div>`;
  }
  $('#view').innerHTML=h;
}

async function vQR(){
  $('#view').innerHTML='<div class="bar"><b>직원 QR 발급</b>'+siteToggle()+'<span class="muted">각 직원이 본인 QR을 휴대폰에서 열어 출퇴근</span></div><div id="body" class="muted">불러오는 중…</div>';
  bindSite(vQR);
  const r=await rpc('haewoo_qr_list',args());
  if(!r.ok){ $('#body').innerHTML='<span class="muted">'+r.message+'</span>'; return; }
  const base=location.origin+location.pathname.replace(/attendance\.html$/,'')+'checkin.html?t=';
  $('#body').innerHTML='<div class="qrgrid" id="qg"></div>';
  for(const e of r.rows.filter(e=>e.site===SITE)){
    const url=base+e.token;
    const c=document.createElement('div'); c.className='qc';
    c.innerHTML=`<div class="nm">${e.full_name}</div><div class="mt">${e.team} · ${ROLE_KO[e.role]||e.role} · #${e.emp_no}</div><div class="qimg"></div><button data-u="${url}">링크 복사</button>`;
    $('#qg').appendChild(c);
    new QRCode(c.querySelector('.qimg'),{text:url,width:132,height:132,correctLevel:QRCode.CorrectLevel.M});
    c.querySelector('button').onclick=ev=>{ navigator.clipboard.writeText(ev.target.dataset.u); ev.target.textContent='복사됨 ✓'; setTimeout(()=>ev.target.textContent='링크 복사',1200); };
  }
}

async function vLoc(){
  const rr=await rpc('haewoo_site_locations',args());
  const list=(rr&&rr.rows)||[];

function renderPay(rate){
  const fmt=n=>Math.round(n).toLocaleString('vi-VN')+'₫';
  const hh=m=>(m/60).toFixed(1);
  let tBase=0,tOt=0,tNight=0,tHol=0,tSum=0;
  let h='<div class="grp"><table><thead><tr><th>#</th><th>이름</th><th>조</th><th>근무일</th><th>OT(h)</th><th>야간(h)</th><th>휴일(h)</th><th>지각(분)</th><th>조퇴(분)</th><th>기본급</th><th>OT</th><th>야간</th><th>휴일</th><th>합계</th><th>경고</th></tr></thead><tbody>';
  for(const e of PAY_DATA){
    const base=(e.total_min/60)*rate, ot=(e.ot_min/60)*rate*0.5, night=(e.night_min/60)*rate*0.3, hol=((e.holiday_min||0)/60)*rate*2.0, sum=base+ot+night+hol;
    tBase+=base;tOt+=ot;tNight+=night;tHol+=hol;tSum+=sum;
    const w=[];
    if(e.ot_min/60>40) w.push('<span class="pill out">월40h↑</span>');
    if((e.ytd_ot_min||0)/60>200) w.push('<span class="pill out">연200h↑</span>');
    h+=`<tr><td>${e.emp_no}</td><td>${e.full_name}</td><td>${e.team}</td><td>${e.work_days}</td><td>${hh(e.ot_min)}</td><td>${hh(e.night_min)}</td><td>${hh(e.holiday_min||0)}</td><td>${e.late_min||0}</td><td>${e.early_min||0}</td><td>${fmt(base)}</td><td>${fmt(ot)}</td><td>${fmt(night)}</td><td>${fmt(hol)}</td><td><b>${fmt(sum)}</b></td><td>${w.join(' ')}</td></tr>`;
  }
  if(!PAY_DATA.length) h+='<tr><td class="muted" colspan="15" style="padding:18px">출퇴근 기록이 없습니다.</td></tr>';
  h+=`</tbody><tfoot><tr><th colspan="9" style="text-align:right">총 인건비</th><th>${fmt(tBase)}</th><th>${fmt(tOt)}</th><th>${fmt(tNight)}</th><th>${fmt(tHol)}</th><th>${fmt(tSum)}</th><th></th></tr></tfoot></table></div>
   <div class="muted" style="margin:10px 0;font-size:12px">※ 실제 출근~퇴근 기준. OT 8h초과(+50%) · 야간(+30%) · 휴일근무(+200%, 총300%) · 지각·조퇴는 스케줄 교대시간 기준. 경고: OT 월40h·연200h 초과(베트남 노동법).</div>`;
  $('#body').innerHTML=h;
}

function _hm(v){ if(v==null||v==='') return ''; if(typeof v==='number'){ const t=Math.round(v*1440); return String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0'); } const m=String(v).match(/(\d{1,2}):(\d{2})/); return m?m[1].padStart(2,'0')+':'+m[2]:''; }
function _ymd(v){ if(v==null||v==='') return ''; if(typeof v==='number'){ const d=new Date(Math.round((v-25569)*86400000)); return isNaN(d)?'':d.toISOString().slice(0,10); } const s=String(v).trim().replace(/[.\/]/g,'-'); const m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/); if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0'); const d=new Date(v); return isNaN(d)?'':d.toISOString().slice(0,10); }
function _near(a,b){ if(!a||!b) return false; const g=s=>{const[H,M]=s.split(':').map(Number);return H*60+M;}; return Math.abs(g(a)-g(b))<=5; }
async function onXlFile(e){
  const f=e.target.files[0]; if(!f) return; $('#body').innerHTML='<span class="muted">분석 중…</span>';
  let wb; try{ wb=XLSX.read(await f.arrayBuffer(),{type:'array'}); }catch(err){ $('#body').innerHTML='<span class="muted">엑셀을 읽지 못했습니다.</span>'; return; }
  const arr=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:'',raw:true});
  if(!arr.length){ $('#body').innerHTML='<span class="muted">데이터가 없습니다.</span>'; return; }
  const keys=Object.keys(arr[0]); const find=cs=>keys.find(k=>{const x=k.toLowerCase().replace(/\s/g,'');return cs.some(c=>x.includes(c));});
  const cNo=find(['사번','empno','emp_no','번호']), cNm=find(['이름','성명','name']), cD=find(['날짜','date','일자']), cI=find(['출근','checkin','시작']), cO=find(['퇴근','checkout','종료']);
  if(!cD||(!cI&&!cO)){ $('#body').innerHTML='<span class="muted">날짜/출근/퇴근 열을 찾지 못했습니다. 헤더(예: 사번, 날짜, 출근, 퇴근)를 확인하세요.</span>'; return; }
  const recs=arr.map(r=>({no:cNo?String(r[cNo]).trim():'', nm:cNm?String(r[cNm]).trim():'', d:_ymd(r[cD]), xin:cI?_hm(r[cI]):'', xout:cO?_hm(r[cO]):''})).filter(r=>r.d);
  const dates=[...new Set(recs.map(r=>r.d))]; const db={};
  for(const d of dates){ const rr=await rpc('haewoo_roster',args({p_date:d})); (rr.rows||[]).forEach(e=>{ const o={in:e.in_ts?new Date(e.in_ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'', out:e.out_ts?new Date(e.out_ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'', name:e.full_name}; db[d+'|'+e.emp_no]=o; db[d+'|n|'+e.full_name]=o; }); }
  let nM=0,nDf=0,nNo=0;
  let h='<div class="grp"><table><thead><tr><th>날짜</th><th>사번</th><th>이름</th><th>엑셀 출근</th><th>DB 출근</th><th>엑셀 퇴근</th><th>DB 퇴근</th><th>결과</th></tr></thead><tbody>';
  for(const r of recs){ const d=r.no?db[r.d+'|'+r.no]:db[r.d+'|n|'+r.nm]; let st,cls;
    if(!d){ st='DB없음'; cls='out'; nNo++; }
    else { const ok=(!r.xin||_near(r.xin,d.in))&&(!r.xout||_near(r.xout,d.out)); if(ok){ st='일치'; cls='in'; nM++; } else { st='차이'; cls='no'; nDf++; } }
    h+=`<tr><td>${r.d}</td><td>${r.no}</td><td>${r.nm||(d&&d.name)||''}</td><td>${r.xin||'-'}</td><td>${d?(d.in||'-'):'-'}</td><td>${r.xout||'-'}</td><td>${d?(d.out||'-'):'-'}</td><td><span class="pill ${cls}">${st}</span></td></tr>`;
  }
  $('#body').innerHTML=`<div class="kpis"><div class="kpi"><div class="n">${recs.length}</div><div class="l">엑셀 행</div></div><div class="kpi"><div class="n">${nM}</div><div class="l">일치</div></div><div class="kpi"><div class="n">${nDf}</div><div class="l">차이</div></div><div class="kpi"><div class="n">${nNo}</div><div class="l">DB없음</div></div></div>`+h+'</tbody></table></div>';
}

const RXV=[
 [/^(\d+)명$/, m=>m[1]+' người'], [/^(\d+)건$/, m=>m[1]+' mục'],
 [/^(G[123]) 조$/, m=>m[1]], [/^(\d+)명$/, m=>m[1]+' người'],
 [/^전체 직원 \((\d+)\)$/, m=>'Toàn bộ NV ('+m[1]+')'],
 [/^최근 질문 \((\d+)\)$/, m=>'Câu hỏi gần đây ('+m[1]+')'],
 [/^견적 요청 \((\d+)건\)$/, m=>'Báo giá ('+m[1]+')'],
 [/^총 인건비 \((\d+)명\)$/, m=>'Tổng chi phí ('+m[1]+' người)'],
 [/^(.+) · (\d+)건$/, m=>m[1]+' · '+m[2]+' mục']
];
const ORIGT=new WeakMap(), ORIGP=new WeakMap();
function viText(s){ const k=(s||'').trim(); if(!k) return null; if(VI[k]!=null) return s.replace(k,VI[k]); for(const [re,fn] of RXV){ const mm=k.match(re); if(mm) return s.replace(k,fn(mm)); } return null; }
function viNode(n){ const v=viText(n.nodeValue); if(v!=null){ if(!ORIGT.has(n)) ORIGT.set(n,n.nodeValue); n.nodeValue=v; } }
function viPh(el){ const k=(el.getAttribute('placeholder')||'').trim(); if(VI[k]!=null){ if(!ORIGP.has(el)) ORIGP.set(el,el.getAttribute('placeholder')); el.setAttribute('placeholder',VI[k]); } }
function viApply(root){ if(LANG2!=='vi'||!root) return; if(root.nodeType===3){ viNode(root); return; } if(root.nodeType!==1) return;
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT); let n; while(n=w.nextNode()) viNode(n);
  root.querySelectorAll('[placeholder]').forEach(viPh); }
function viRestore(){ const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT); let n; while(n=w.nextNode()){ if(ORIGT.has(n)) n.nodeValue=ORIGT.get(n); }
  document.querySelectorAll('[placeholder]').forEach(el=>{ if(ORIGP.has(el)) el.setAttribute('placeholder',ORIGP.get(el)); }); }
let VOBS=new MutationObserver(ms=>{ if(LANG2!=='vi') return; VOBS.disconnect(); ms.forEach(m=>m.addedNodes.forEach(nd=>viApply(nd))); VOBS.observe(document.getElementById('app'),{childList:true,subtree:true}); });
function setLang2(l){ LANG2=l; localStorage.setItem('hw_lang',l); document.querySelectorAll('.langb').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  VOBS.disconnect(); if(l==='vi') viApply(document.body); else viRestore(); VOBS.observe(document.getElementById('app'),{childList:true,subtree:true}); }
document.querySelectorAll('.langb').forEach(b=>b.onclick=()=>setLang2(b.dataset.l));
